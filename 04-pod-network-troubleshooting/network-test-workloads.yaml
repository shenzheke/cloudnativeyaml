apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
  namespace: net-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: server
      role: server
  template:
    metadata:
      labels:
        app: server
        role: server
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: server
  namespace: net-lab
spec:
  selector:
    app: server
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-same-node
  namespace: net-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client-same-node
      role: client
  template:
    metadata:
      labels:
        app: client-same-node
        role: client
    spec:
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: ["server"]
                topologyKey: kubernetes.io/hostname
      containers:
        - name: toolbox
          image: busybox:1.36
          command: ["/bin/sh", "-c", "sleep 360000"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-cross-node
  namespace: net-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client-cross-node
      role: client
  template:
    metadata:
      labels:
        app: client-cross-node
        role: client
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: ["server"]
                topologyKey: kubernetes.io/hostname
      containers:
        - name: toolbox
          image: busybox:1.36
          command: ["/bin/sh", "-c", "sleep 360000"]
