apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-generator
  namespace: autoscale-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: load-generator
  template:
    metadata:
      labels:
        app: load-generator
    spec:
      containers:
        - name: busybox
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              while true; do
                wget -q -O- http://cpu-demo.autoscale-lab.svc.cluster.local;
              done
